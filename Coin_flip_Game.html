<!DOCTYPE html>
<html lang="en">
<head>
  
  <title>Coin Flip Game Without Functions</title>
</head>
<script>
  let guess = 'Heads';
  let randomNumber = Math.random();
  let computerMove = '';
  let result = '';
</script>
<body>
 
  <button onclick="
  randomNumber = Math.random();
   if (randomNumber > 0 && randomNumber <= 0.5){
    computerMove = 'Heads'

   } else if (randomNumber > 0.5 && randomNumber <=1){
    console.log('Tails');
    computerMove = 'Tails'
   }
   console.log(computerMove);

   if(computerMove === 'Heads'){
    result = 'You win.';
   }else if (computerMove === 'Tails'){
    result = 'You lose.';
   }
   alert(`You picked heads. Computer picked ${computerMove}. ${result}`);
    ">Heads</button>

  <button onclick="
  randomNumber = Math.random();
   if (randomNumber > 0 && randomNumber <= 0.5){

</body>
</html>
