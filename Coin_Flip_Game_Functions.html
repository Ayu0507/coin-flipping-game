<!DOCTYPE html>
<html lang="en">
<head>
  
  <title>Coin Flip Game With Functions</title>
</head>
<script>
  let guess = 'Heads';
  let randomNumber = Math.random();
  let computerMove = '';
  let result = '';
  function PickComputerMove(){
   randomNumber = Math.random();
   if (randomNumber > 0 && randomNumber <= 0.5)
    computerMove = 'Heads'
   else if (randomNumber > 0.5 && randomNumber <=1)
    computerMove = 'Tails'
   
   console.log(computerMove);
  }
</script>
<body>
 
  <button onclick="
  PickComputerMove();
  if(computerMove === 'Heads'){
    result = 'You win.';
   }else if (computerMove === 'Tails'){
    result = 'You lose.';
   }
   alert(`You picked heads. Computer picked ${computerMove}. ${result}`);
    ">Heads</button>

  <button onclick="
   PickComputerMove();
   if(computerMove === 'Heads'){
    result = 'You lose.';
   }else if (computerMove === 'Tails'){
    result = 'You win.';
   }
   alert(`You picked tails. Computer picked ${computerMove}. ${result}`);
    ">Tails</button>

</body>
