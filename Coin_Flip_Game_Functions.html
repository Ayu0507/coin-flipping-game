<!DOCTYPE html>
<html lang="en">
<head>
  
  <title>Coin Flip Game With Functions</title>
</head>
<script>
  let guess = 'Heads';
  let randomNumber = Math.random();
  let computerMove = '';
  let result = '';
  function PickComputerMove(){
   randomNumber = Math.random();
   if (randomNumber > 0 && randomNumber <= 0.5)
    computerMove = 'Heads'
   else if (randomNumber > 0.5 && randomNumber <=1)
    computerMove = 'Tails'
   
   console.log(computerMove);
  }

  let score = {
    wins : 0,
    losses : 0
  }

</script>
<body>
 
  <button onclick="
  PickComputerMove();
  if(computerMove === 'Heads'){
    result = 'You win.';
   }else if (computerMove === 'Tails'){
    result = 'You lose.';
   }
   
   if(computerMove === 'Heads'){
    score.wins += 1;
   }else if (computerMove === 'Tails'){
     score.losses += 1;
   }

   alert(`You picked heads. Computer picked ${computerMove}. ${result}.
Wins : ${score.wins}, Losses : ${score.losses}`);
    ">Heads</button>

  <button onclick="
   PickComputerMove();
   if(computerMove === 'Heads'){
    result = 'You lose.';
   }else if (computerMove === 'Tails'){
    result = 'You win.';
   }

    if(computerMove === 'Tails'){
    score.wins += 1;
   }else if (computerMove === 'Heads'){
     score.losses += 1;
   }

   alert(`You picked tails. Computer picked ${computerMove}. ${result}
Wins : ${score.wins}, Losses : ${score.losses}`);
    ">Tails</button>

    <button onclick="
    alert(`You picked tails. Computer picked ${computerMove}. ${result}
Wins : ${score.wins = 0}, Losses : ${score.losses = 0}`);
  ">Reset Score</button>

</body>
</html>
