<head>
  
  <title>Coin Flip Game With Functions</title>
</head>
<script>
  let guess = 'Heads';
  let randomNumber = Math.random();
 
  function PickComputerMove(){
     let computerMove = '';
   randomNumber = Math.random();
   if (randomNumber > 0 && randomNumber <= 0.5)
    computerMove = 'Heads'
   else if (randomNumber > 0.5 && randomNumber <=1)
    computerMove = 'Tails'
   
  return computerMove;  
  }

function playerMove(PlayGame){
  computerMove = PickComputerMove();
  let result = '';

  if(PlayGame === 'Heads'){
if(computerMove === 'Heads'){
    result = 'You win.';
   }else if (computerMove === 'Tails'){
    result = 'You lose.';
   }
   else if (PlayGame === 'Tails'){
   if(computerMove === 'Heads'){
  result = 'You lose.';
   }else if (computerMove === 'Tails'){
   result = 'You win.';
   }
  }
  console.log(computerMove)
  }
  
  alert(`You picked ${PlayGame}. Computer picked ${computerMove}. ${result}.`);
}
</script>
<body>
 
  <button onclick="playerMove('Heads')">Heads</button>
 
  <button onclick="playerMove('Tails')">Tails</button>

   
</body>
